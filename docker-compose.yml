services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  ui:
    build: .
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
