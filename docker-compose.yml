services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_API_FALLBACK_MODE: live
    depends_on:
      - backend
    ports:
      - "5173:5173"
